# Use this config for the Railway *frontend* service (set in the service settings).
# Backend service should use railway.toml at the repo root.

[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
